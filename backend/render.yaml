services:
  # ── Web API (Daphne ASGI — HTTP + WebSocket) ──────────────────────────────
  - type: web
    name: erpro-dz-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /api/auth/login/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: USE_MONGOMOCK
        value: "False"
      - key: MONGO_DB
        value: erp_radiance
      - key: MONGO_URI
        sync: false          # a renseigner manuellement (MongoDB Atlas)
      - key: REDIS_URL
        fromService:
          type: redis
          name: erpro-dz-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*"
      - key: FRONTEND_URL
        value: "http://localhost:7474"

  # ── Celery Worker ─────────────────────────────────────────────────────────
  - type: worker
    name: erpro-dz-worker
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A config.celery worker --loglevel=info --concurrency=1
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB
        value: erp_radiance
      - key: USE_MONGOMOCK
        value: "False"
      - key: REDIS_URL
        fromService:
          type: redis
          name: erpro-dz-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: erpro-dz-api
          envVarKey: SECRET_KEY

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: erpro-dz-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
