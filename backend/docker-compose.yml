version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: erp_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: erp_radiance
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7.2-alpine
    container_name: erp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongodb_data:
  redis_data:
